  <g stroke="#6ea8fe" stroke-width="3" stroke-linecap="round" opacity="0.9">
    <path d="M300 220H490"/>
    <path d="M710 220H900"/>
    <path d="M600 280V340"/>
    <path d="M600 340H290V390"/>
    <path d="M600 340H510V390"/>
    <path d="M600 340H730V390"/>
    <path d="M600 340H950V390"/>
    <path d="M510 480L435 560"/>
    <path d="M730 480L765 560"/>
