<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6ea8fe"/>
      <stop offset="1" stop-color="#9b8cff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="720" rx="28" fill="#0b1020"/>
  <circle cx="1000" cy="80" r="240" fill="#1b2450" opacity="0.85"/>
  <circle cx="160" cy="640" r="260" fill="#111a3d" opacity="0.9"/>
  <text x="600" y="70" text-anchor="middle" fill="#EEF2FF" font-family="Inter, Arial" font-size="34" font-weight="800">Agent Identity Control Plane</text>
  <text x="600" y="108" text-anchor="middle" fill="#B6C2FF" font-family="Inter, Arial" font-size="18">DID • Keys • Credentials • Capabilities • Trust • Revocation • Audit</text>

  <g filter="url(#shadow)">
    <rect x="80" y="170" width="220" height="100" rx="18" fill="#121933" stroke="rgba(255,255,255,0.12)"/>
    <text x="190" y="212" text-anchor="middle" fill="#EEF2FF" font-family="Inter, Arial" font-size="21" font-weight="700">Agent Runtime</text>
    <text x="190" y="242" text-anchor="middle" fill="#B6C2FF" font-family="Inter, Arial" font-size="15">Creates / operates agent</text>

    <rect x="490" y="160" width="220" height="120" rx="18" fill="url(#g)"/>
    <text x="600" y="208" text-anchor="middle" fill="white" font-family="Inter, Arial" font-size="23" font-weight="800">Agent Registry</text>
    <text x="600" y="240" text-anchor="middle" fill="white" opacity="0.9" font-family="Inter, Arial" font-size="15">Stable DID + metadata</text>

    <rect x="900" y="170" width="220" height="100" rx="18" fill="#121933" stroke="rgba(255,255,255,0.12)"/>
    <text x="1010" y="212" text-anchor="middle" fill="#EEF2FF" font-family="Inter, Arial" font-size="21" font-weight="700">Tools & APIs</text>
    <text x="1010" y="242" text-anchor="middle" fill="#B6C2FF" font-family="Inter, Arial" font-size="15">Verify before trust</text>

    <rect x="200" y="390" width="180" height="90" rx="16" fill="#121933" stroke="rgba(255,255,255,0.12)"/>
    <text x="290" y="430" text-anchor="middle" fill="#EEF2FF" font-family="Inter, Arial" font-size="18" font-weight="700">DID Resolver</text>
    <text x="290" y="456" text-anchor="middle" fill="#B6C2FF" font-family="Inter, Arial" font-size="13">Resolve document</text>

    <rect x="420" y="390" width="180" height="90" rx="16" fill="#121933" stroke="rgba(255,255,255,0.12)"/>
    <text x="510" y="430" text-anchor="middle" fill="#EEF2FF" font-family="Inter, Arial" font-size="18" font-weight="700">Key Service</text>
    <text x="510" y="456" text-anchor="middle" fill="#B6C2FF" font-family="Inter, Arial" font-size="13">Rotate / revoke</text>

    <rect x="640" y="390" width="180" height="90" rx="16" fill="#121933" stroke="rgba(255,255,255,0.12)"/>
    <text x="730" y="430" text-anchor="middle" fill="#EEF2FF" font-family="Inter, Arial" font-size="18" font-weight="700">Credential Issuer</text>
    <text x="730" y="456" text-anchor="middle" fill="#B6C2FF" font-family="Inter, Arial" font-size="13">Signed claims</text>

    <rect x="860" y="390" width="180" height="90" rx="16" fill="#121933" stroke="rgba(255,255,255,0.12)"/>
    <text x="950" y="430" text-anchor="middle" fill="#EEF2FF" font-family="Inter, Arial" font-size="18" font-weight="700">Trust Engine</text>
    <text x="950" y="456" text-anchor="middle" fill="#B6C2FF" font-family="Inter, Arial" font-size="13">Score reputation</text>

    <rect x="310" y="560" width="250" height="80" rx="16" fill="#0f1630" stroke="rgba(255,255,255,0.12)"/>
    <text x="435" y="605" text-anchor="middle" fill="#EEF2FF" font-family="Inter, Arial" font-size="18" font-weight="700">Revocation Registry</text>

    <rect x="640" y="560" width="250" height="80" rx="16" fill="#0f1630" stroke="rgba(255,255,255,0.12)"/>
    <text x="765" y="605" text-anchor="middle" fill="#EEF2FF" font-family="Inter, Arial" font-size="18" font-weight="700">Audit Log</text>
