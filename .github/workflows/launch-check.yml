name: Launch Readiness Check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate-launch-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run launch readiness checker
        run: python scripts/check_launch_ready.py

      - name: Validate site links and SEO tags
        run: python scripts/check_site_links.py
