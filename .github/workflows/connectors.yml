name: Connector Validation

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-connectors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate connector manifests
        run: python scripts/validate_connectors.py

      - name: Syntax-check the MCP server
        run: python -m py_compile mcp/agent_identity_server.py
